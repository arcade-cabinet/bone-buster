name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  android:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@v4
      - run: pnpm install --frozen-lockfile
      - name: Build web bundle
        run: pnpm build
      - name: Capacitor sync
        # Skip if android/ hasn't been generated yet (cap add android
        # is a one-time bootstrap done locally then committed).
        run: |
          if [ -d "android" ]; then
            pnpm cap:sync
            cd android && ./gradlew assembleDebug
          else
            echo "android/ not yet bootstrapped — skipping APK build"
          fi
      - uses: actions/upload-artifact@v7
        if: success() && hashFiles('android/app/build/outputs/apk/debug/*.apk') != ''
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
