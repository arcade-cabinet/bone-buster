name: CI

on:
  pull_request:
  push:
    branches: [main]
    # T5 — tag pushes trigger CI so the `mobile-perf` job's tag
    # gate (refs/tags/v*) actually has a chance to fire on
    # release-please tags.
    tags: ['v*']

# CodeQL actions/missing-workflow-permissions: lock GITHUB_TOKEN to
# read-only at the workflow level. Individual jobs override upward
# only when they need write (none here — CI is verify + build only;
# release.yml owns the publish surface).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  # C-1 (full-review) — the documented merge gate is `pnpm verify`, which
  # includes test:browser + assets:verify-runtime + audio:verify-runtime.
  # CI previously ran only lint+check+unit+build, so the real-Chromium tier
  # (the only one exercising WebGL/GLB/AudioContext/the shadow-map composite)
  # and the asset/audio runtime checks never ran in CI — a renderer or
  # asset-URL regression could pass every check and deploy. This job runs
  # the rest of the gate.
  browser:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Real-Chromium browser tests
        run: pnpm test:browser
      - name: Verify runtime asset + audio bundles
        run: pnpm assets:verify-runtime && pnpm audio:verify-runtime

  # C-1 / C-2 (full-review) — the canonical visual e2e suite. The screenshot
  # specs self-launch the `--use-angle=gl` + CDP path (default headless
  # SwiftShader deadlocks on the shadow-map composite — never revert), so
  # they run headless on the runner once Chromium + system deps are present.
  # Pairs with the in-spec pixel assertions to give CI a real visual gate.
  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Canonical + per-archetype screenshots
        # Playwright's webServer config auto-launches `pnpm dev` on :5191
        # (reuseExistingServer is false under CI) and waits for it, so no
        # explicit server/build step is needed here.
        #
        # CR-C2 — the committed baselines are `-chromium-darwin` (generated on
        # macOS). Playwright defaults `--update-snapshots` to "missing", so on
        # the Linux runner the absent `-chromium-linux` baselines are CREATED
        # on first run (uploaded below for a maintainer to commit) while any
        # PRESENT baseline still gates pixel drift. Real render crashes/hangs
        # still fail the job. Once the Linux goldens are committed this becomes
        # a full drift gate on CI too.
        run: pnpm test:e2e:screenshots && pnpm test:e2e:archetype-screenshots
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-screenshots
          path: |
            docs/assets/screenshots/
            tests/e2e/screenshots.spec.ts-snapshots/
            tests/e2e/archetypeScreenshots.spec.ts-snapshots/

  # Lighthouse — Core Web Vitals gate on the prerendered bundle.
  # Runs three Lighthouse passes against the static `dist/client/` build
  # (no dev server needed; LHCI serves it) and asserts the Vike prerender
  # is hitting the FCP/LCP/TBT/CLS budgets we set after baseline-ing the
  # post-Vike build locally. Reports upload to temporary-public-storage so
  # PR reviewers get a clickable HTML report URL in the job log.
  lighthouse:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Lighthouse CI
        run: pnpm lighthouse
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/

  # OBS4 — per-archetype perf-budget regression gate. Runs `pnpm test:perf`
  # (scripts/obs3-perf-snapshot.mjs) for each of the 5 archetypes,
  # comparing peak draw-calls + triangles against the tracked baselines
  # at tests/perf-baselines/{archetype}.json. Fails if any archetype
  # regresses > 10% above its baseline or crosses the absolute budgets.
  # Baselines are updated by hand in a separate commit when the
  # regression is intentional (e.g. a new effect or material).
  perf:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Start vite dev server
        # OBS4 fix — perf script reads `window.__bonebuster` which is
        # dead-code-eliminated in production builds (debugHooksEnabled()
        # returns false). Vite's dev server keeps the debug bundle, so
        # `pnpm dev` is the right backing server even though preview
        # would be smaller. Pinned to port 5191 to match the local
        # workflow; perf script defaults to that URL.
        run: |
          # `server.host: true` is set in vite.config.ts so we don't need
          # `--host 0.0.0.0` on the CLI. Post-Vike, the vike plugin
          # routes the vite CLI through Vike's CAC parser, which rejects
          # the unknown `--host` flag.
          pnpm dev &
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5191 | grep -q 200; then
              echo "dev server up on :5191"
              break
            fi
            sleep 1
          done
      - name: Perf snapshot vs tracked baselines
        run: pnpm test:perf

  android:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - run: pnpm install --frozen-lockfile
      - name: Build web bundle
        run: pnpm build
      - name: Capacitor sync
        # Skip if android/ hasn't been generated yet (cap add android
        # is a one-time bootstrap done locally then committed).
        run: |
          if [ -d "android" ]; then
            pnpm cap:sync
            cd android && ./gradlew assembleDebug
          else
            echo "android/ not yet bootstrapped — skipping APK build"
          fi
      - uses: actions/upload-artifact@v7
        if: success() && hashFiles('android/app/build/outputs/apk/debug/*.apk') != ''
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  # T5 — mobile perf gate. Boots a Pixel 5a-class AVD, installs the
  # debug APK from the `android` job, launches the Capacitor WebView,
  # forwards its DevTools port, and runs the OBS3 perf probe through
  # the in-emulator WebView. Asserts minFps >= 30 per archetype.
  #
  # Gated on the `mobile-perf` PR label OR release tags so the
  # 10-15min emulator boot doesn't slow every PR. To run on a PR,
  # add the `mobile-perf` label.
  mobile-perf:
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') ||
      contains(github.event.pull_request.labels.*.name, 'mobile-perf')
    runs-on: ubuntu-latest
    needs: android
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium (CDP client only — no browser launch)
        # `--with-deps` mirrors the `perf` job above. CDP-only usage
        # still needs Playwright's system deps installed on the runner
        # for the chromium browser-launcher fallback paths it loads.
        run: pnpm exec playwright install --with-deps chromium
      - name: Download debug APK from android job
        # The `android` job already produced + uploaded
        # `app-debug-apk`. Downloading saves the ~3-5min of repeating
        # the build, sync, and gradle steps here.
        uses: actions/download-artifact@v8
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/
      - name: Enable KVM (faster emulator boot)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run mobile perf probe in Pixel 5a AVD
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          heap-size: 1024M
          disable-animations: true
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            # Install the APK built upstream.
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            # Launch the activity. The package + activity match the
            # Capacitor scaffolding (com.bonebuster.app/.MainActivity).
            adb shell am start -n com.bonebuster.app/.MainActivity
            # Wait for the WebView to be live + remote-debugging socket
            # to be available. Capacitor enables WebView.setWebContentsDebuggingEnabled
            # in debug builds automatically.
            sleep 15
            # Find the WebView's abstract-socket name. Format is
            # `webview_devtools_remote_<pid>`. We pin this to OUR
            # app's PID rather than picking the first socket the
            # grep returns — a fresh emulator can have multiple
            # processes (system WebView updater, etc) listening on
            # similar sockets, and attaching to the wrong one
            # turns the perf gate into noise.
            APP_PID=$(adb shell pidof -s com.bonebuster.app | tr -d '\r')
            if [ -z "$APP_PID" ]; then
              echo "T5 — com.bonebuster.app process not running"
              adb logcat -d -t 200 chromium:I '*:S'
              exit 1
            fi
            WV_SOCKET="webview_devtools_remote_${APP_PID}"
            if ! adb shell cat /proc/net/unix | grep -q "@${WV_SOCKET}$"; then
              echo "T5 — expected socket @${WV_SOCKET} not found"
              adb logcat -d -t 200 chromium:I '*:S'
              exit 1
            fi
            echo "T5 — forwarding tcp:9222 to $WV_SOCKET"
            adb forward tcp:9222 localabstract:$WV_SOCKET
            # Probe the CDP root endpoint to confirm. Hard-fail
            # if 20 attempts don't get a response — otherwise the
            # downstream `pnpm test:perf:mobile` would fail with
            # an opaque "connection refused" further along.
            CDP_LIVE=0
            for i in {1..20}; do
              if curl -s http://localhost:9222/json/version | grep -q "Browser"; then
                echo "T5 — CDP endpoint live after ${i}s"
                CDP_LIVE=1
                break
              fi
              sleep 1
            done
            if [ "$CDP_LIVE" -ne 1 ]; then
              echo "T5 — CDP endpoint never responded on tcp:9222"
              adb logcat -d -t 200 chromium:I '*:S'
              exit 1
            fi
            # Run the mobile perf probe through the CDP-connected WebView.
            pnpm test:perf:mobile
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mobile-perf-snapshots
          path: test-results/perf-snapshots-mobile/
