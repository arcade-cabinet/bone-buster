name: Release

on:
  push:
    branches: [main]
  # Manual escape-hatch: lets us redeploy Pages without cutting a
  # new release tag. Needed when a squash-merge collapses many
  # commits and release-please's parser doesn't see a user-facing
  # leading conventional-commit on the first body line (it parses
  # the commit body, not the subject, so `feat:` in the subject +
  # `docs:` as first body line counts as no-user-facing-change).
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force the build-pages + deploy-pages jobs even when release-please did not cut a release'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-pages:
    needs: release-please
    # Run when release-please cut a new release (normal path) OR
    # when a maintainer manually fired the workflow with
    # force_deploy=true (escape-hatch path).
    if: |
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for GitHub Pages
        # BC3 — base path comes from VITE_BASE_PATH (read by
        # vite.config.ts via normalizeBasePath). The deployed
        # Pages site lives under /bone-buster/, so the bundled
        # asset URLs must prefix with that.
        env:
          VITE_BASE_PATH: /bone-buster/
        run: pnpm build:pages
      - name: Verify runtime asset bundle
        run: pnpm assets:verify-runtime
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          # Post-Vike: build emits to dist/client/ (browser bundle +
          # prerendered index.html) and dist/server/ (SSR entry).
          # GH Pages serves only the client bundle.
          path: dist/client

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
