name: Release

on:
  push:
    branches: [main]
  # Manual escape-hatch: lets us redeploy Pages without cutting a
  # new release tag. Needed when a squash-merge collapses many
  # commits and release-please's parser doesn't see a user-facing
  # leading conventional-commit on the first body line (it parses
  # the commit body, not the subject, so `feat:` in the subject +
  # `docs:` as first body line counts as no-user-facing-change).
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force the build-pages + deploy-pages jobs even when release-please did not cut a release'
        type: boolean
        required: false
        default: false

# H-4 (full-review) — least privilege. The default token is read-only at
# the workflow level; each job grants only the writes it needs, mirroring
# ci.yml. Previously every job inherited workflow-wide `contents: write`.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-pages:
    needs: release-please
    # PREP-CI1 (OVERHAUL2 review) — CONTINUOUS DEPLOY. Pages reflects every main
    # push, so a user-facing change can never silently fail to deploy because a
    # squash title led with chore:/ci: (the 2-week-stale-deploy class). The
    # release-please tag still gates the versioned Android APK artifact in
    # release.yml; Pages is decoupled from semver. Also deploys on a release cut
    # (redundant but harmless) and on the manual force_deploy escape hatch.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for GitHub Pages
        # BC3 — base path comes from VITE_BASE_PATH (read by
        # vite.config.ts via normalizeBasePath). The deployed
        # Pages site lives under /bone-buster/, so the bundled
        # asset URLs must prefix with that.
        env:
          VITE_BASE_PATH: /bone-buster/
        run: pnpm build:pages
      - name: Verify runtime asset bundle
        run: pnpm assets:verify-runtime
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          # Post-Vike: build emits to dist/client/ (browser bundle +
          # prerendered index.html) and dist/server/ (SSR entry).
          # GH Pages serves only the client bundle.
          path: dist/client

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # CR-H1 (full-review) — post-deploy smoke test. Drives the LIVE Pages
  # deploy past landing → in-game via the debug hooks and fails if the
  # site doesn't boot or the console reports errors. The script
  # (scripts/verify-pages-deploy.mjs) already exists and reads PAGES_URL;
  # it was previously wired into nothing. This is the highest-value
  # observability control for a static game with no error-reporting backend.
  verify-deploy:
    needs: deploy-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 10.2.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke-test the live Pages deploy
        env:
          # deploy-pages emits the canonical site URL; append the debug flags the
          # verify script drives through (start → HUD). SEC-3: `bonebusterDebug`
          # is safe here — it ONLY exposes the __bonebuster hook surface +
          # capture-mode on a page the URL-bearer already controls (no privilege
          # escalation, no data exfil; the production build still gates the
          # cheat hooks behind NODE_ENV separately). `bonebusterSeed=12345` is a
          # legacy-numeric phrase (accepted as a string) — a FIXED seed so the
          # smoke run boots a deterministic map every deploy.
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}?bonebusterDebug&bonebusterSeed=12345
        run: node scripts/verify-pages-deploy.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pages-deploy-smoke
          path: |
            /tmp/pages-landing.png
            /tmp/pages-ingame.png
