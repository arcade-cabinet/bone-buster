version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      react-three:
        patterns:
          - "@react-three/*"
          - "three"
          - "three-stdlib"
          - "postprocessing"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
