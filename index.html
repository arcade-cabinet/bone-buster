<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- BC4 — viewport tuned for foldables. `viewport-fit=cover`
		     extends content beneath the notch / status bar so HUD
		     bands can use `env(safe-area-inset-*)` for padding;
		     `user-scalable=no` blocks pinch-zoom on touch so the
		     player can't accidentally zoom the canvas mid-combat. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
		<meta name="theme-color" content="#0F0C12" />
		<!--
		  S2 — Content Security Policy. Defense-in-depth — there are no
		  current XSS sinks in the codebase (zero innerHTML / eval /
		  Function / dangerouslySetInnerHTML; confirmed by SECURITY audit
		  2026-05-15), but a CSP locks the absence in against future
		  regressions.

		  Allowlist rationale:
		    - script-src 'self' 'wasm-unsafe-eval'
		        Tone.js AudioWorklets + jeep-sqlite custom element load
		        WASM at runtime (needs wasm-unsafe-eval, NOT unsafe-eval).
		    - style-src 'self' 'unsafe-inline'
		        framer-motion injects style attributes at runtime.
		    - img-src 'self' data: blob:
		        canvas → blob URLs for screenshot captures; data: URIs
		        from postprocessing's lookup textures.
		    - worker-src 'self' blob:
		        AudioWorklet workers from Tone.js + potential Vite-issued
		        blob: workers.
		    - connect-src 'self'
		        The game has ZERO outbound fetches (offline single-player).
		        Lock it.
		    - object-src 'none' / base-uri 'none' / frame-ancestors 'none'
		        Removes the legacy <object> / <embed> attack surface and
		        prevents clickjacking via iframe embedding.
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';"
		/>
		<title>OBJEXOOM — Rip and Tear</title>
		<meta name="description" content="OBJEXOOM — a polished DOOM-flavored arcade FPS. Procedural sectors, real PSX monsters, and a flashlight you absolutely need." />
		<link rel="manifest" href="./manifest.webmanifest" />
		<link rel="icon" href="./favicon.ico" sizes="32x32" />
		<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
		<!-- BC4 — PWA standalone hints. `mobile-web-app-capable` is the
		     modern standard (Chrome 108+); `apple-mobile-web-app-capable`
		     stays for iOS Safari, which never adopted the unprefixed
		     name. The status-bar style only applies on iOS. The app
		     title is the home-screen label — R8 source-string sweep
		     re-points this at "Bone Buster" alongside the document
		     title. -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="OBJEXOOM" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/app/main.tsx"></script>
	</body>
</html>
